<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auraxis Demo Host</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "/node_modules/vue/dist/vue.esm-browser.js",
          "@auraxis/vue": "/packages/vue/dist/index.js"
        }
      }
    </script>
    <script src="/demo-config.js"></script>
    <style>
      :root {
        color: #1f2933;
        background: #f3f6f8;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px 1fr;
      }

      .sidebar {
        background: #17212f;
        color: #dbe4ee;
        padding: 24px;
      }

      .brand {
        font-size: 18px;
        font-weight: 700;
      }

      .nav {
        display: grid;
        gap: 8px;
        margin-top: 28px;
      }

      .nav span {
        border-radius: 8px;
        padding: 10px 12px;
        color: #aebbd0;
      }

      .nav span:first-child {
        background: #233044;
        color: #ffffff;
      }

      .main {
        padding: 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .title h1 {
        margin: 0;
        font-size: 24px;
      }

      .title p {
        margin: 6px 0 0;
        color: #667085;
      }

      .user {
        border: 1px solid #d6dee7;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px 12px;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-top: 24px;
      }

      .panel {
        border: 1px solid #dce3ea;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }

      .panel h2 {
        margin: 0;
        font-size: 15px;
      }

      .metric {
        margin-top: 14px;
        font-size: 28px;
        font-weight: 700;
      }

      .muted {
        color: #667085;
        font-size: 13px;
      }

      .workbench {
        margin-top: 16px;
      }

      .table {
        width: 100%;
        margin-top: 12px;
        border-collapse: collapse;
        font-size: 14px;
      }

      .table th,
      .table td {
        border-bottom: 1px solid #edf1f5;
        padding: 12px 8px;
        text-align: left;
      }

      .table th {
        color: #667085;
        font-weight: 600;
      }

      @media (max-width: 760px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .main {
          padding: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { createApp, h } from 'vue'
      import { AuraxisAssistant } from '@auraxis/vue'

      const demoConfig = window.__AURAXIS_DEMO__

      async function getAuthToken() {
        const response = await fetch('/dev-token?user=demo-user')

        if (!response.ok) {
          throw new Error('Demo host token request failed.')
        }

        return response.text()
      }

      const HostApp = {
        render() {
          return h('div', { class: 'shell' }, [
            h('aside', { class: 'sidebar' }, [
              h('div', { class: 'brand' }, 'Auraxis Host'),
              h('nav', { class: 'nav' }, [
                h('span', 'Dashboard'),
                h('span', 'Customers'),
                h('span', 'Orders'),
                h('span', 'Settings')
              ])
            ]),
            h('main', { class: 'main' }, [
              h('div', { class: 'topbar' }, [
                h('div', { class: 'title' }, [
                  h('h1', '业务系统模拟页'),
                  h('p', '这里模拟一个已登录用户正在使用的 Vue 业务系统。')
                ]),
                h('div', { class: 'user' }, 'Demo User · demo-tenant')
              ]),
              h('section', { class: 'grid' }, [
                h('div', { class: 'panel' }, [
                  h('h2', '今日会话'),
                  h('div', { class: 'metric' }, '128'),
                  h('div', { class: 'muted' }, '客服入口流量')
                ]),
                h('div', { class: 'panel' }, [
                  h('h2', '待处理请求'),
                  h('div', { class: 'metric' }, '14'),
                  h('div', { class: 'muted' }, '用于测试页面上下文')
                ]),
                h('div', { class: 'panel' }, [
                  h('h2', 'Gateway'),
                  h('div', { class: 'metric' }, 'Online'),
                  h('div', { class: 'muted' }, demoConfig.gatewayBaseUrl)
                ])
              ]),
              h('section', { class: ['panel', 'workbench'] }, [
                h('h2', '最近订单'),
                h('table', { class: 'table' }, [
                  h('thead', [
                    h('tr', [h('th', '订单'), h('th', '客户'), h('th', '状态'), h('th', '金额')])
                  ]),
                  h('tbody', [
                    h('tr', [h('td', '#A-1024'), h('td', 'Acme Clinic'), h('td', 'Review'), h('td', '¥2,400')]),
                    h('tr', [h('td', '#A-1025'), h('td', 'North Lab'), h('td', 'Ready'), h('td', '¥860')]),
                    h('tr', [h('td', '#A-1026'), h('td', 'West Health'), h('td', 'Pending'), h('td', '¥1,180')])
                  ])
                ])
              ]),
              h(AuraxisAssistant, {
                appId: 'demo-app',
                apiBaseUrl: demoConfig.gatewayBaseUrl,
                getAuthToken,
                pageContext: {
                  module: 'orders',
                  selectedOrderId: 'A-1024',
                  environment: 'local-demo'
                },
                position: 'bottom-right'
              })
            ])
          ])
        }
      }

      createApp(HostApp).mount('#app')
    </script>
  </body>
</html>
